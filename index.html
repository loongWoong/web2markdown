<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Browser Mark</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f3f5fb;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      background: white;
      border-bottom: 1px solid #e6e8f2;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .title {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    h1 {
      color: #333;
      font-size: 22px;
    }

    .subtitle {
      color: #666;
      font-size: 13px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      min-width: 280px;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f2f7;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e3e8f3;
    }

    .status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      display: block;
    }

    .content {
      flex: 1;
      display: flex;
      min-height: 0;
      gap: 12px;
      padding: 12px;
    }

    .browser-container {
      flex: 3;
      padding: 0;
      min-width: 0;
    }

    .editor-container {
      flex: 2;
      min-width: 320px;
      background: white;
      border: 1px solid #d8ddea;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-header {
      padding: 10px 12px;
      border-bottom: 1px solid #e6e8f2;
      background: #f8f9ff;
      font-size: 13px;
      color: #4a5568;
      font-weight: 600;
    }

    .meta-panel {
      padding: 10px 12px;
      border-bottom: 1px solid #edf0f7;
      background: #ffffff;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .meta-panel input,
    .meta-panel select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d7dcea;
      border-radius: 6px;
      font-size: 12px;
    }

    .meta-panel .full {
      grid-column: 1 / -1;
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #edf0f7;
      background: #fcfcff;
      flex-wrap: wrap;
    }

    .quick-actions button {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #e2e7f5;
      background: #f2f5ff;
      color: #364153;
    }

    .quick-actions button:hover {
      background: #e8edff;
    }

    .summary-card {
      margin: 10px 12px 0;
      border: 1px solid #e2e8f5;
      border-radius: 8px;
      background: #fafbff;
      padding: 10px;
      font-size: 12px;
      color: #4a5568;
    }

    .summary-card p {
      margin-top: 6px;
      line-height: 1.5;
      color: #374151;
      white-space: pre-wrap;
    }

    #markdownEditor {
      flex: 1;
      width: 100%;
      border: none;
      padding: 12px;
      resize: none;
      font-size: 14px;
      line-height: 1.5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    }

    #markdownEditor:focus {
      outline: none;
    }

    webview {
      width: 100%;
      height: 100%;
      border: 1px solid #d8ddea;
      border-radius: 10px;
      background: white;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <div class="title">
        <h1>🌐 Web Browser Mark</h1>
        <p class="subtitle">将输入区与网页浏览区合并到同一窗口</p>
      </div>

      <div class="controls">
        <input type="text" id="url" placeholder="https://example.com" />
        <button class="btn-primary" id="openBtn">打开网页</button>
        <button class="btn-secondary" id="noteBtn" disabled>笔记</button>
        <button class="btn-secondary" id="saveBtn" disabled>保存选中内容</button>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div class="content">
      <div class="browser-container">
        <webview id="browserView" src="https://example.com" allowpopups></webview>
      </div>
      <div class="editor-container">
        <div class="editor-header">Markdown 笔记编辑区</div>
        <div class="meta-panel">
          <input id="noteTitle" class="full" type="text" placeholder="笔记标题（可选）" />
          <select id="noteCategory">
            <option value="待分类">待分类</option>
            <option value="研究">研究</option>
            <option value="产品">产品</option>
            <option value="学习">学习</option>
            <option value="灵感">灵感</option>
          </select>
          <input id="noteTags" type="text" placeholder="标签（用逗号分隔）" />
        </div>
        <div class="quick-actions">
          <button id="appendInsightBtn" type="button">+ 关键洞察模板</button>
          <button id="appendTodoBtn" type="button">+ 待办清单模板</button>
          <button id="insertSummaryBtn" type="button">插入信息卡片到Markdown</button>
        </div>
        <div class="summary-card">
          <strong>信息卡片预览</strong>
          <p id="summaryCard">尚未生成，点击“笔记”后将自动生成来源信息与摘要。</p>
        </div>
        <textarea id="markdownEditor" placeholder="先在左侧网页中选中内容，点击“笔记”后可在这里编辑，再点击“保存选中内容”进行存储。"></textarea>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
